<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Auxiliary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script type="module" crossorigin src="/assets/index-p_D2R0Zg.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-vKkDAo1N.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // 買い切りプラン以外は API キー関連の UI を非表示にする
      (function () {
        var cachedPlan = null;
        var planChecked = false;

        function checkPlan(cb) {
          if (planChecked) return cb(cachedPlan);
          var token = localStorage.getItem("pro_token");
          if (!token) { planChecked = true; cachedPlan = null; return cb(null); }
          fetch("/api/session/validate", { headers: { "x-pro-token": token } })
            .then(function (r) { return r.json(); })
            .then(function (d) { cachedPlan = d.valid ? d.plan : null; planChecked = true; cb(cachedPlan); })
            .catch(function () { planChecked = true; cachedPlan = null; cb(null); });
        }

        // セクションタイトルの完全一致で親 div ごと非表示にする
        var SECTION_TITLES = ["APIキー設定状況", "APIキーの設定方法", "API優先順位"];

        function hideApiSections() {
          if (cachedPlan === "buy_once") return;

          // 全 <p> 要素からセクションタイトルを探す
          var allP = document.querySelectorAll("p");
          for (var i = 0; i < allP.length; i++) {
            var txt = (allP[i].textContent || "").trim();
            for (var j = 0; j < SECTION_TITLES.length; j++) {
              if (txt === SECTION_TITLES[j]) {
                // このタイトル <p> の親 <div> がセクション全体なので、それを非表示
                var section = allP[i].parentElement;
                if (section) {
                  section.style.display = "none";
                }
                break;
              }
            }
          }

          // 「APIキーが設定されていません」警告ブロック（セクション外に出る場合の保険）
          var allDivs = document.querySelectorAll("div");
          for (var i = 0; i < allDivs.length; i++) {
            var t = (allDivs[i].textContent || "").trim();
            if (t.indexOf("APIキーが設定されていません") !== -1 && t.length < 200) {
              allDivs[i].style.display = "none";
            }
          }
        }

        // 200ms 間隔でチェック
        setInterval(function () {
          checkPlan(function (plan) {
            if (plan !== "buy_once") hideApiSections();
          });
        }, 200);
      })();
    </script>
  </body>
</html>
