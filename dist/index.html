<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Auxiliary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script type="module" crossorigin src="/assets/index-p_D2R0Zg.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-vKkDAo1N.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // 買い切りプラン以外は API キー関連の UI を非表示にする
      (function () {
        var cachedPlan = null;
        var planChecked = false;

        function checkPlan(cb) {
          if (planChecked) return cb(cachedPlan);
          var token = localStorage.getItem("pro_token");
          if (!token) { planChecked = true; cachedPlan = null; return cb(null); }
          fetch("/api/session/validate", { headers: { "x-pro-token": token } })
            .then(function (r) { return r.json(); })
            .then(function (d) { cachedPlan = d.valid ? d.plan : null; planChecked = true; cb(cachedPlan); })
            .catch(function () { planChecked = true; cachedPlan = null; cb(null); });
        }

        var API_TEXTS = [
          "APIキー設定状況",
          "APIキーの設定方法",
          "Gemini API Key",
          "OpenAI API Key",
          "Anthropic API Key",
          "APIキーが設定されていません",
          "APIキーが1つ以上設定済み",
          "APIキーを設定する",
          "APIキーを保存する",
          "GEMINI_API_KEY",
          "OPENAI_API_KEY",
          "ANTHROPIC_API_KEY"
        ];

        function hideApiElements() {
          if (cachedPlan === "buy_once") return;

          // テキストを含む全要素を走査して、APIキー関連のブロックを非表示
          var allEls = document.querySelectorAll("p, span, div, button, label, code");
          allEls.forEach(function (el) {
            var txt = el.textContent || "";
            for (var i = 0; i < API_TEXTS.length; i++) {
              if (txt.indexOf(API_TEXTS[i]) === -1) continue;
              // この要素自体がマッチした場合、表示用の親ブロックを探して非表示にする
              // ただし大きすぎる親は隠さない（設定モーダル全体を消さないように）
              if (el.textContent.trim() === API_TEXTS[i] || el.children.length < 3) {
                // 直近の意味のある親を探す
                var target = el;
                var parent = el.parentElement;
                // 親をたどって、兄弟要素がある div まで上がる
                while (parent && parent.children.length <= 1 && parent.id !== "root") {
                  target = parent;
                  parent = parent.parentElement;
                }
                if (target && target.id !== "root") {
                  target.style.display = "none";
                }
                break;
              }
            }
          });

          // ガイド冒頭の説明文を変更
          document.querySelectorAll("p, span").forEach(function (el) {
            if (el.textContent && el.textContent.indexOf("API キーとフックの設定ができます") !== -1) {
              el.textContent = el.textContent.replace("API キーとフックの設定ができます", "フックの設定ができます");
            }
          });

          // FAQ「どの AI が使われているか分かりません」内の API キー言及を非表示
          document.querySelectorAll("p, span, button, div").forEach(function (el) {
            var t = (el.textContent || "").trim();
            if (t.indexOf("どの AI が使われているか") !== -1 || t.indexOf("APIキーが設定されていません") !== -1) {
              var block = el.closest('[class*="rounded"]');
              if (block) block.style.display = "none";
            }
          });
        }

        // 200ms 間隔でチェック（モーダルが開かれるタイミングを逃さない）
        setInterval(function () {
          checkPlan(function (plan) {
            if (plan !== "buy_once") hideApiElements();
          });
        }, 200);
      })();
    </script>
  </body>
</html>
